<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Puente Live · Cada quien habla su idioma</title>
<style>
  :root{
    --bg:#0d1220; --panel:#141b2e; --line:#232c45;
    --me:#e5484d; --them:#2fb8c6;
    --text:#eef1f8; --dim:#8a93ab; --ok:#4cc38a;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);
       display:flex;flex-direction:column;height:100dvh;overflow:hidden}

  /* ---------- Lobby ---------- */
  .lobby{flex:1;display:flex;flex-direction:column;justify-content:center;
         padding:28px;max-width:430px;margin:0 auto;width:100%;gap:14px}
  .logo{text-align:center;margin-bottom:8px}
  .logo h1{font-size:26px;letter-spacing:1px}
  .logo h1 span{color:var(--them)}
  .logo p{color:var(--dim);font-size:13px;margin-top:4px}
  label{font-size:12px;color:var(--dim);text-transform:uppercase;letter-spacing:1px}
  input,select{width:100%;padding:13px;border-radius:10px;border:1px solid var(--line);
    background:var(--panel);color:var(--text);font-size:16px;margin-top:5px}
  input::placeholder{color:#4a5470}
  .btn{width:100%;padding:15px;border:none;border-radius:12px;font-size:16px;font-weight:600;
    cursor:pointer;color:#fff;margin-top:4px}
  .btn.create{background:var(--me)}
  .btn.join{background:var(--them)}
  .divider{text-align:center;color:var(--dim);font-size:12px;margin:6px 0}

  /* ---------- Sala ---------- */
  .room{flex:1;display:none;flex-direction:column;min-height:0}
  .room.active{display:flex}
  .room-head{padding:10px 14px;border-bottom:1px solid var(--line);display:flex;
    align-items:center;justify-content:space-between;gap:8px;flex-shrink:0}
  .code-pill{background:var(--panel);border:1px solid var(--line);border-radius:10px;
    padding:6px 12px;font-weight:700;letter-spacing:3px;font-size:16px}
  .head-info{font-size:11px;color:var(--dim)}
  .share-btn{background:none;border:1px solid var(--them);color:var(--them);
    border-radius:9px;padding:7px 12px;font-size:12px;cursor:pointer}

  .share-panel{display:none;padding:14px;border-bottom:1px solid var(--line);text-align:center;flex-shrink:0}
  .share-panel.open{display:block}
  .share-panel img{background:#fff;border-radius:10px;padding:6px;margin:8px 0}
  .share-panel .wa{display:inline-block;background:#25d366;color:#fff;text-decoration:none;
    border-radius:9px;padding:9px 16px;font-size:14px;font-weight:600;margin-top:4px}
  .share-panel small{display:block;color:var(--dim);margin-top:8px;font-size:11px}

  .transcript{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px}
  .bubble{max-width:88%;padding:9px 13px;border-radius:13px;font-size:16px;line-height:1.45;word-wrap:break-word}
  .bubble .who{display:block;font-size:11px;color:var(--dim);margin-bottom:2px}
  .mine{align-self:flex-end;background:rgba(229,72,77,.14);border-right:3px solid var(--me)}
  .mine.interim{opacity:.55;font-style:italic}
  .theirs{align-self:flex-start;background:rgba(47,184,198,.14);border-left:3px solid var(--them)}
  .theirs.preview{opacity:.6;border:1px dashed var(--dim);background:transparent}
  .sys{align-self:center;color:var(--dim);font-size:12px;background:var(--panel);
    border-radius:20px;padding:4px 14px}

  .controls{flex-shrink:0;padding:12px;border-top:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;gap:20px}
  .mic-btn{border:none;border-radius:50%;width:72px;height:72px;font-size:29px;color:#fff;
    background:var(--me);cursor:pointer;box-shadow:0 4px 20px rgba(229,72,77,.35);
    transition:transform .15s}
  .mic-btn:active{transform:scale(.94)}
  .mic-btn.off{background:#3a4260;box-shadow:none}
  .mic-btn.rec{animation:pulse 1.2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,255,255,.35)}
    70%{box-shadow:0 0 0 20px rgba(255,255,255,0)}100%{box-shadow:0 0 0 0 rgba(255,255,255,0)}}
  .status-line{position:absolute;visibility:hidden}
  .mic-wrap{text-align:center}
  .mic-wrap .st{font-size:11px;color:var(--dim);margin-top:6px}

  .toast{position:fixed;left:50%;top:14px;transform:translateX(-50%);background:#2a1a1e;
    color:#ffb3b6;border:1px solid #5c2a30;padding:10px 16px;border-radius:10px;
    font-size:13px;z-index:50;max-width:92%;display:none}
  .toast.show{display:block}
  @media (prefers-reduced-motion: reduce){.mic-btn.rec{animation:none;outline:3px solid #fff}}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- ================= LOBBY ================= -->
<div class="lobby" id="lobby">
  <div class="logo">
    <h1>PUENTE <span>LIVE</span></h1>
    <p>Cada quien habla su idioma. Cada quien escucha el suyo.</p>
  </div>

  <div>
    <label>Tu nombre</label>
    <input id="inName" placeholder="Ej: Pedro" maxlength="30">
  </div>

  <div>
    <label>Tu idioma (el que hablas y escuchas)</label>
    <select id="inLang">
      <option value="es" data-sr="es-PE">Español</option>
      <option value="tr" data-sr="tr-TR">Türkçe (Turco)</option>
      <option value="en" data-sr="en-US">English (Inglés)</option>
      <option value="it" data-sr="it-IT">Italiano</option>
      <option value="pt" data-sr="pt-BR">Português</option>
      <option value="fr" data-sr="fr-FR">Français</option>
      <option value="de" data-sr="de-DE">Deutsch (Alemán)</option>
      <option value="pl" data-sr="pl-PL">Polski (Polaco)</option>
    </select>
  </div>

  <button class="btn create" id="btnCreate">Crear sala nueva</button>
  <div class="divider">— o únete a una sala existente —</div>
  <div>
    <input id="inCode" placeholder="Código de sala (ej: KM4P)" maxlength="4"
           style="text-transform:uppercase;letter-spacing:4px;text-align:center">
  </div>
  <button class="btn join" id="btnJoin">Unirme a la sala</button>
</div>

<!-- ================= SALA ================= -->
<div class="room" id="room">
  <div class="room-head">
    <div>
      <div class="code-pill" id="roomCode">----</div>
      <div class="head-info" id="roomInfo">1 persona</div>
    </div>
    <button class="share-btn" id="btnShare">Invitar 📲</button>
  </div>

  <div class="share-panel" id="sharePanel">
    <div style="font-size:13px;color:var(--dim)">Tu amigo escanea el QR o abre el enlace,<br>elige SU idioma, y listo:</div>
    <img id="qrImg" width="150" height="150" alt="QR de la sala">
    <div><a class="wa" id="waLink" target="_blank">Enviar por WhatsApp</a></div>
    <small id="shareUrl"></small>
  </div>

  <div class="transcript" id="log"></div>

  <div class="controls">
    <div class="mic-wrap">
      <button class="mic-btn off" id="micBtn">🎤</button>
      <div class="st" id="micSt">Toca para hablar</div>
    </div>
  </div>
</div>

<script>
(function(){
  const $ = id => document.getElementById(id);
  const toast = $('toast');
  function showToast(m, ms=5000){
    toast.textContent = m; toast.classList.add('show');
    clearTimeout(toast._t); toast._t = setTimeout(()=>toast.classList.remove('show'), ms);
  }

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR) showToast('Este navegador no soporta reconocimiento de voz. Usa Google Chrome.', 60000);

  // ---------- Estado ----------
  let ws = null, myId = null, myLang = 'es', mySrLang = 'es-PE', myName = '';
  let micOn = false, rec = null, playingIncoming = false;
  let interimBubble = null;
  const previews = new Map(); // id emisor -> burbuja de vista previa

  // ---------- Voces ----------
  let voices = [];
  function loadVoices(){ voices = speechSynthesis.getVoices(); }
  loadVoices();
  if (speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = loadVoices;
  function speak(text, lang){
    return new Promise(res=>{
      const u = new SpeechSynthesisUtterance(text);
      u.lang = lang;
      const cands = voices.filter(v => v.lang.toLowerCase().startsWith(lang.slice(0,2)));
      const g = cands.find(v => /google/i.test(v.name));
      if(g || cands[0]) u.voice = g || cands[0];
      u.onend = res; u.onerror = res;
      speechSynthesis.speak(u);
    });
  }

  // ---------- UI ----------
  function addBubble(cls, text, who){
    const b = document.createElement('div');
    b.className = 'bubble ' + cls;
    if(who){ const w = document.createElement('span'); w.className='who'; w.textContent = who; b.appendChild(w); }
    const t = document.createElement('span'); t.textContent = text; b.appendChild(t);
    b._text = t;
    $('log').appendChild(b);
    $('log').scrollTop = $('log').scrollHeight;
    return b;
  }
  function sysMsg(text){ addBubble('sys', text); }

  // ---------- WebSocket ----------
  let session = null;        // {code, lang, name} — permite reconectar a la misma sala
  let reconnectTimer = null;

  function rejoin(){
    connect(()=> ws.send(JSON.stringify({ t:'join', code: session.code, lang: session.lang, name: session.name })));
  }
  function scheduleReconnect(){
    clearTimeout(reconnectTimer);
    reconnectTimer = setTimeout(()=>{
      if(!session) return;
      if(document.hidden){ scheduleReconnect(); return; } // espera a que la app vuelva al frente
      rejoin();
    }, 1500);
  }
  // Al volver de WhatsApp u otra app, reconecta solo si la conexión se cayó
  document.addEventListener('visibilitychange', ()=>{
    if(!document.hidden && session && (!ws || ws.readyState > 1)) rejoin();
    if(!document.hidden && 'wakeLock' in navigator) navigator.wakeLock.request('screen').catch(()=>{});
  });

  function connect(then){
    const proto = location.protocol === 'https:' ? 'wss://' : 'ws://';
    ws = new WebSocket(proto + location.host);
    ws.onopen = then;
    ws.onclose = ()=>{
      if(session){ scheduleReconnect(); }         // en sala: reconexión silenciosa
      else showToast('No se pudo conectar. Revisa tu internet e intenta de nuevo.');
    };
    ws.onmessage = (ev)=>{
      let m; try{ m = JSON.parse(ev.data); }catch(_){ return; }

      if(m.t === 'error'){ showToast(m.msg); return; }

      if(m.t === 'joined'){
        myId = m.you;
        const firstTime = !session;
        session = { code: m.code, lang: myLang, name: myName };
        if(firstTime){ enterRoom(m.code, m.members); }
        else { updateMembers(m.members); sysMsg('Reconectado ✓'); if(micOn && !playingIncoming) resumeRec(); }
        return;
      }
      if(m.t === 'members'){
        updateMembers(m.members);
        return;
      }
      if(m.t === 'preview'){
        let b = previews.get(m.id);
        if(!b){ b = addBubble('theirs preview', '', m.name || 'Participante'); previews.set(m.id, b); }
        b._text.textContent = m.text;
        $('log').scrollTop = $('log').scrollHeight;
        return;
      }
      if(m.t === 'speech'){
        const prev = previews.get(m.id);
        if(prev){
          prev.classList.remove('preview');
          prev._text.textContent = m.text;
          previews.delete(m.id);
        } else {
          addBubble('theirs', m.text, m.name || 'Participante');
        }
        // Pausa mi micrófono SOLO mientras suena la voz entrante en MI celular,
        // para que mi propio parlante no contamine mi micrófono.
        playIncoming(m.text);
        return;
      }
    };
  }

  async function playIncoming(text){
    playingIncoming = true;
    pauseRec();
    await speak(text, mySrLang);
    playingIncoming = false;
    if(micOn) resumeRec();
  }

  // ---------- Reconocimiento de voz ----------
  // Android NO avisa de forma fiable cuándo termina una frase: va emitiendo
  // resultados "finales" que crecen palabra por palabra. Por eso NO confiamos en
  // isFinal para enviar. En su lugar acumulamos todo lo dicho en la sesión y
  // confirmamos la frase cuando detectamos SILENCIO (sin texto nuevo por 1.2s).
  const SILENCE_MS = 1200;
  let lastInterimSent = 0;
  let sessionText = '';    // todo lo ya confirmado dentro de la sesión actual
  let pendingText = '';    // lo que llevas dicho en la frase en curso
  let silenceTimer = null;
  let lastCommitted = '', lastCommitTime = 0;

  function normalize(t){
    return t.toLowerCase().trim().replace(/[.,!?¿¡]/g,'').replace(/\s+/g,' ');
  }

  // Texto completo que el motor lleva reconocido en esta sesión
  function buildFull(results){
    let s = '';
    for(let i = 0; i < results.length; i++) s += results[i][0].transcript;
    return s.replace(/\s+/g,' ').trim();
  }

  function resetUtterance(){
    clearTimeout(silenceTimer);
    pendingText = '';
    if(interimBubble){ interimBubble.remove(); interimBubble = null; }
  }

  function commitUtterance(fullAtTime){
    const text = pendingText.trim();
    const norm = normalize(text);
    const now = Date.now();
    sessionText = fullAtTime; // a partir de aquí, solo cuenta lo nuevo
    resetUtterance();
    if(!text) return;
    // Red de seguridad: descarta una frase idéntica repetida en menos de 5s
    if(norm === lastCommitted && (now - lastCommitTime) < 5000) return;
    lastCommitted = norm; lastCommitTime = now;
    addBubble('mine', text);
    if(ws && ws.readyState === 1) ws.send(JSON.stringify({ t:'final', text }));
  }

  function buildRec(){
    const r = new SR();
    r.lang = mySrLang; r.continuous = true; r.interimResults = true;

    r.onstart = ()=>{ sessionText = ''; }; // cada sesión empieza de cero

    r.onresult = (e)=>{
      const full = buildFull(e.results);
      if(!full) return;

      // Lo NUEVO es lo que aún no se ha confirmado. Funciona igual si el motor
      // acumula los resultados o si los reemplaza al empezar otra frase.
      let text;
      if(sessionText && full.startsWith(sessionText)) text = full.slice(sessionText.length).trim();
      else { sessionText = ''; text = full; }
      if(!text) return; // todavía no hay nada nuevo: el reloj de silencio sigue corriendo

      pendingText = text;
      if(!interimBubble) interimBubble = addBubble('mine interim', '');
      interimBubble._text.textContent = text;
      $('log').scrollTop = $('log').scrollHeight;

      // Vista previa al otro celular mientras sigues hablando
      const now = Date.now();
      if(now - lastInterimSent > 900 && ws && ws.readyState === 1){
        lastInterimSent = now;
        ws.send(JSON.stringify({ t:'interim', text }));
      }

      // Reinicia el reloj de silencio: si dejas de hablar 1.2s, se confirma la frase
      clearTimeout(silenceTimer);
      silenceTimer = setTimeout(()=> commitUtterance(full), SILENCE_MS);
    };
    r.onerror = (e)=>{
      if(e.error === 'not-allowed'){
        showToast('Permiso de micrófono denegado. Actívalo en el candado de la barra de direcciones.');
        setMic(false);
      }
    };
    r.onend = ()=>{
      // Al cortarse la sesión, envía lo que quedó pendiente para no perder palabras
      if(pendingText.trim()) commitUtterance('');
      sessionText = '';
      // El motor se corta solo cada cierto tiempo: se reanuda si el mic sigue activo
      if(micOn && !playingIncoming){ try{ r.start(); }catch(_){} }
    };
    return r;
  }
  function pauseRec(){ if(rec){ try{ rec.stop(); }catch(_){} } }
  function resumeRec(){ if(rec){ try{ rec.start(); }catch(_){} } }
  function setMic(on){
    micOn = on;
    const btn = $('micBtn');
    btn.classList.toggle('off', !on);
    btn.classList.toggle('rec', on);
    $('micSt').textContent = on ? 'Escuchando… habla normal' : 'Toca para hablar';
    if(on){
      if(!rec) rec = buildRec();
      try{ rec.start(); }catch(_){}
    } else {
      pauseRec();
      resetUtterance();
    }
  }
  $('micBtn').addEventListener('click', ()=> setMic(!micOn));

  // ---------- Sala ----------
  function enterRoom(code, members){
    $('lobby').style.display = 'none';
    $('room').classList.add('active');
    $('roomCode').textContent = code;
    updateMembers(members);
    const url = location.origin + location.pathname + '?sala=' + code;
    $('shareUrl').textContent = url;
    $('qrImg').src = 'https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=' + encodeURIComponent(url);
    $('waLink').href = 'https://wa.me/?text=' + encodeURIComponent(
      'Únete a mi sala de Puente Live para conversar cada uno en su idioma 🌎🎙️ ' + url);
    sysMsg('Sala ' + code + ' creada. Comparte el código o el QR.');
    // Mantener la pantalla encendida si el dispositivo lo permite
    if('wakeLock' in navigator){ navigator.wakeLock.request('screen').catch(()=>{}); }
  }
  function updateMembers(members){
    $('roomInfo').textContent = members.length + (members.length === 1 ? ' persona' : ' personas') +
      ' · ' + members.map(m => (m.name || 'Anónimo') + ' (' + m.lang.toUpperCase() + ')').join(', ');
  }
  $('btnShare').addEventListener('click', ()=> $('sharePanel').classList.toggle('open'));

  // ---------- Lobby ----------
  function readLobby(){
    myName = $('inName').value.trim();
    const sel = $('inLang');
    myLang = sel.value;
    mySrLang = sel.options[sel.selectedIndex].dataset.sr;
  }
  $('btnCreate').addEventListener('click', ()=>{
    readLobby();
    connect(()=> ws.send(JSON.stringify({ t:'create', lang: myLang, name: myName })));
  });
  $('btnJoin').addEventListener('click', ()=>{
    readLobby();
    const code = $('inCode').value.trim().toUpperCase();
    if(code.length !== 4){ showToast('Ingresa el código de 4 letras de la sala.'); return; }
    connect(()=> ws.send(JSON.stringify({ t:'join', code, lang: myLang, name: myName })));
  });

  // Si llega por enlace compartido (?sala=XXXX), precarga el código
  const params = new URLSearchParams(location.search);
  if(params.get('sala')) $('inCode').value = params.get('sala').toUpperCase();
})();
</script>
</body>
</html>
